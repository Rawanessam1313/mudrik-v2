<section class="stats">

  <div class="stats-grid">

   @for (stat of stats; track stat.label) {
  <div class="stat-card">
    <span class="stat-number">
      {{ stat.current }}{{ stat.suffix }}
    </span>

    <span class="stat-label">
      {{ stat.label }}
    </span>
  </div>
}

  </div>

</section>
