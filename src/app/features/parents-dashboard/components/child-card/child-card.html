<article class="child-card card">
  <div class="child-card__head">
    @if (avatarUrl) {
      <img class="child-card__avatar" [src]="avatarUrl" [alt]="name" />
    } @else {
      <div class="child-card__avatar child-card__avatar--placeholder">{{ initials }}</div>
    }
    <div>
      <h3 class="child-card__name">{{ name }}</h3>
      <p class="child-card__meta">{{ age }} سنوات</p>
    </div>
  </div>

  <div class="child-card__progress">
    <div class="child-card__progress-head">
      <span>التقدّم</span>
      <strong>{{ progress }}%</strong>
    </div>
    <div class="child-card__bar">
      <span [style.width.%]="progress"></span>
    </div>
  </div>
</article>
